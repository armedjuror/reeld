server {
    listen 80;
    server_name your-domain.com;   # <-- replace with your domain or EC2 public IP

    # Large file uploads (audio/video for reel generation)
    client_max_body_size 500M;

    # Proxy timeouts — renders can take several minutes
    proxy_read_timeout    600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;

    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (render-stream events)
        proxy_set_header  Connection  '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;
    }
}

# HTTPS block is added automatically by certbot.
# After running: certbot --nginx -d your-domain.com
# this file will be updated with the SSL config.